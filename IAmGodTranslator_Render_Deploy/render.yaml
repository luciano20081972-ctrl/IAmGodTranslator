# GodTranslator Development Progress

## Current Version Target

GodTranslator_Web_v9_0_5_Restore_And_Polling_Fix.zip

## v9.0.5 Restore Recommendation / Chapter Polling Fix

### Completed Tasks

- Fixed chapter-index polling so it no longer forces the app back to the Chapters tab.
- Preserved the active tab during background refresh/polling; Admin Settings and Translate remain selected while polling is paused.
- Scoped chapter-index polling to the visible Chapters tab only.
- Added terminal `blocked` long-job status support for rebuild jobs that cannot proceed.
- Updated chapter-index rebuild to finish as `blocked` when counts exist but no readable local/canonical/legacy chapter files are found.
- Prevented repeated auto-queueing of the same rebuild when the app only has stale counts and no readable files.
- Updated library responses to recommend `restore_from_supabase_backup` instead of showing endless "Chapter index is being prepared."
- Updated Storage Health, Bootstrap, and Recovery Status so stale active counts do not mean "Supabase live data ready."
- Added a restore-required Chapters empty state with a user-clicked "Go to Supabase Recovery" action.
- Confirmed manifest restore writes local chapter files and now mirrors them into canonical Supabase paths:
  - `novels/{novel_id}/originals/`
  - `novels/{novel_id}/references/`
  - `novels/{novel_id}/ai_translations/`
- Bumped frontend cache/service-worker versions to v84.

### QA Results

- Python syntax check passed.
- JavaScript syntax check passed.
- Simulated active counts 906 / 412 / 26 with canonical and legacy files at 0.
- Library returned `chapter_index_status=blocked`, 0 rows, `recommended_action=restore_from_supabase_backup`, and did not queue a rebuild job.
- Storage Health returned `recommended_recovery_action=restore_from_supabase_backup` with canonical and legacy counts at 0.
- Manual chapter-index rebuild finished as `blocked`, progress 100, rows 0, with the required restore message.
- Restore test completed and wrote canonical Supabase paths for Original, Reference, and AI chapter files.
- After restore, the library returned restored chapter rows in the test fixture.
- No OpenAI call was made.
- No translation was started.

### Deploy Notes

- Deploy `GodTranslator_Web_v9_0_5_Restore_And_Polling_Fix.zip`.
- If Storage Health says counts exist but readable files are missing, run Supabase backup dry-run, confirm restore, then rebuild index.
- After a full production restore, canonical Supabase counts should reflect the restored backup contents, such as 906 Original, 412 Reference, and 25 or 26 AI files.

## v9.0.4 Render Long Jobs / Wake Hydration Completion

### Completed Tasks

- Added persistent background long-job state under `DATA_DIR/long_jobs` for chapter index rebuilds, local-to-Supabase migration, and translation readiness rebuilds.
- Added automatic lightweight Supabase hydration for `novels/index.json`, metadata, `counts.json`, `chapter_index.json`, and `translation_readiness.json`.
- Updated `/api/novels/{novel_id}/library` to return persisted chapter rows immediately when `chapter_index.json` exists.
- If counts show chapters but the chapter index is missing, empty, or stale, the library endpoint now queues a background chapter-index rebuild instead of blocking the request.
- Added background admin chapter-index endpoints:
  - `POST /api/admin/novels/{novel_id}/rebuild-chapter-index/start`
  - `GET /api/admin/novels/{novel_id}/rebuild-chapter-index/jobs/{job_id}`
- Added background local-to-Supabase migration endpoint/status polling:
  - `POST /api/admin/storage/migrate-local-to-supabase/start`
  - `GET /api/admin/storage/migrate-local-to-supabase/jobs/{job_id}`
- Added translation readiness cache build/read endpoints and persisted `translation_readiness.json` locally and to Supabase.
- Made batch estimate/start return quickly from chapter index or readiness cache instead of reading every chapter during the request.
- Added Translate controls for start chapter, end chapter, Missing AI only, and Overwrite existing AI.
- Renamed Batch size to Max chapters to translate now.
- Added frontend progress polling for chapter index rebuild, local-to-Supabase migration, and translation readiness rebuilds.
- Public chapter-list refresh no longer depends on admin-only job status; it refreshes through the public library endpoint while the index is rebuilding.
- Bumped frontend cache/service-worker versions to v83.

### Changed Files

- `app/long_jobs.py`
- `app/novels.py`
- `app/main.py`
- `static/app.js`
- `templates/index.html`
- `static/service-worker.js`
