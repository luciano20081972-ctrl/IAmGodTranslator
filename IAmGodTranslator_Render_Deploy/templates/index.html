<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reader</title>
  <link rel="stylesheet" href="/static/styles.css?v=11.1.0">
</head>
<body>
  <div class="shell">
    <header class="app-header">
      <a class="brand" href="#/home" aria-label="Reader Home" data-brand-home>
        <span class="brand-mark" data-brand-mark>R</span>
        <span>
          <strong data-brand-name>Reader</strong>
          <small data-brand-tagline>Reading Workspace</small>
        </span>
      </a>
      <button class="global-search-trigger" id="globalSearchBtn" type="button" aria-label="Open search">Search novels, chapters, actions</button>
      <nav class="top-nav" id="primaryNav" aria-label="Primary">
        <a href="#/home">Home</a>
        <a href="#/library">Library</a>
      </nav>
      <div class="shell-actions">
        <button id="jobCenterBtn" type="button" title="Activity">Activity</button>
        <details class="profile-menu" id="profileMenu">
          <summary class="account-chip" id="accountBtn">Guest</summary>
          <nav class="profile-menu-items" id="profileMenuItems" aria-label="Profile menu"></nav>
        </details>
      </div>
    </header>

    <aside id="activityBanner" class="activity-banner" hidden></aside>
    <aside id="notificationCenter" class="notification-center" hidden></aside>

    <main id="app" class="app-main" aria-live="polite">
      <section class="loading-card">Loading reader...</section>
    </main>

    <nav id="mobileBottomNav" class="mobile-bottom-nav" aria-label="Mobile primary navigation"></nav>

    <dialog id="commandDialog" class="command-dialog">
      <form method="dialog">
        <div class="command-header">
          <input id="commandInput" type="search" placeholder="Search or type a command..." autocomplete="off">
          <button id="commandClose" type="button" aria-label="Close search">Close</button>
        </div>
        <section id="commandResults" class="command-results"></section>
      </form>
    </dialog>
  </div>

  <script id="appBrandConfig" type="application/json">
    {"name":"Lumen Reader","shortName":"Lumen","tagline":"Reading Workspace","mark":"L"}
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/static/app.js?v=11.1.0"></script>
</body>
</html>
